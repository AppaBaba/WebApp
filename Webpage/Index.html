
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Navigation Menu</title>
    <style>
        /* Reset default margins and paddings */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        /* Navigation bar styling */
        nav {
            background-color: #0c0c0c;
        }

        nav ul {
            list-style: none;
            display: flex;
        }

        nav ul li {
            flex: 1;
        }

        nav ul li a {
            display: block;
            padding: 14px;
            text-align: center;
            text-decoration: none;
            color: greenyellow;
            transition: background 0.3s;
        }

        nav ul li a:hover {
            background-color: #575757;
        }

        /* Page content */
        .content {
            padding: 20px;
        }
    </style>
</head>
<body>

    <!-- Navigation Menu -->
    <nav>
        <ul>
            <li><a href="index.html">Home</a></li>
            <li><a href="WebHTML.html">HTML</a></li>
            <li><a href="WebCSS.html">CSS</a></li>
            <li><a href="WebJS.html">Javascript</a></li>
        </ul>
    </nav>

    <!-- Main Content -->
    <div class="content">
        <h1>Welcome to My Website</h1>
        <p>This is the home page. Use the menu above to navigate to other pages.</p>
    </div>

</body>
</html>
