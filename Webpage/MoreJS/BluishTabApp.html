

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bluish Tabs Example</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 20px;
        background: #f4f4f4;
    }

    /* Tab container */
    .tab {
        display: flex;
        border-bottom: 2px solid #a29cc4;
    }

    /* Tab buttons */
    .tab button {
        background-color: #acadd8;
        border: none;
        outline: none;
        padding: 12px 20px;
        cursor: pointer;
        transition: background-color 0.3s;
        border-top-left-radius: 12px;
        border-top-right-radius: 12px;
        margin-right: 4px;
        font-size: 16px;
        color: red;
    }

    /* Hover effect */
    .tab button:hover {
        background-color: #938ab2;
    }

    /* Active tab */
    .tab button.active {
        background-color: #1a1a82;
        border-bottom: 2px solid white; /* blends with content */
        font-weight: bold;
    }

    /* Tab content */
    .tabcontent {
        display: none;
        padding: 20px;
        background-color: #152983;
        border: 2px solid #3d217e;
        border-top: none;
        border-bottom-left-radius: 12px;
        border-bottom-right-radius: 12px;
        animation: fadeEffect 0.3s;
        color: white;
    }

    /* Fade animation */
    @keyframes fadeEffect {
        from {opacity: 0;}
        to {opacity: 1;}
    }
</style>
</head>
<body>

<h2>Bluish Tabs Example</h2>

<div class="tab">
    <button class="tablinks" onclick="openTab(event, 'Tab1')" id="defaultOpen">Tab 1</button>
    <button class="tablinks" onclick="openTab(event, 'Tab2')">Tab 2</button>
    <button class="tablinks" onclick="openTab(event, 'Tab3')">Tab 3</button>
    <button class="tablinks" onclick="openTab(event, 'Tab4')">Tab 4</button>
    <button class="tablinks" onclick="openTab(event, 'Tab5')">Tab 5</button>
</div>

<div id="Tab1" class="tabcontent">
    <h3>Tab 1</h3>
    <p>This is the content for Tab 1.</p>
</div>

<div id="Tab2" class="tabcontent">
    <h3>Tab 2</h3>
    <p>This is the content for Tab 2.</p>
</div>

<div id="Tab3" class="tabcontent">
    <h3>Tab 3</h3>
    <p>This is the content for Tab 3.</p>
</div>

<div id="Tab4" class="tabcontent">
    <h3>Tab 4</h3>
    <p>This is the content for Tab 4.</p>
</div>

<div id="Tab5" class="tabcontent">
    <h3>Tab 5</h3>
    <p>This is the content for Tab 5.</p>
</div>

<script>
function openTab(evt, tabName) {
    // Hide all tab content
    const tabcontent = document.getElementsByClassName("tabcontent");
    for (let i = 0; i < tabcontent.length; i++) {
        tabcontent[i].style.display = "none";
    }

    // Remove 'active' class from all buttons
    const tablinks = document.getElementsByClassName("tablinks");
    for (let i = 0; i < tablinks.length; i++) {
        tablinks[i].classList.remove("active");
    }

    // Show the selected tab and mark button as active
    document.getElementById(tabName).style.display = "block";
    evt.currentTarget.classList.add("active");
}

// Open the first tab by default
document.getElementById("defaultOpen").click();
</script>

<!-- Links -->
    <section>
        <h2>Useful Links</h2>
        <p>
            Go to the real <a href="../Index.html" target="_self">Homepage</a>
        </p>
    </section>

    <!-- Footer -->
    <footer>
        <hr>
        <p>Rounded Tab Tops with Javascript Webpage</p>
    </footer>

</body>
</html>
